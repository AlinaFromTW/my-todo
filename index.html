<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Soda Todo - 視角切換版</title>
    <style>
        :root {
            --bg-blue: #D1E9FF;
            --grid-line: #E3F2FD;
            --urgent-pink: #FFD1D1;
            --important-yellow: #FFF9C4;
            --delegate-blue: #D1F2FF;
            --waste-green: #D1FFD1;
            --text-dark: #455A64;
            --soft-blue: #90CAF9;
            --due-red: #FF5252;
        }

        body {
            background-color: var(--bg-blue);
            background-image: linear-gradient(var(--grid-line) 1px, transparent 1px),
                              linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
            background-size: 20px 20px;
            font-family: -apple-system, sans-serif;
            margin: 0; padding: 10px; display: flex; justify-content: center;
        }

        .container {
            width: 100%; max-width: 500px; background: white;
            padding: 20px; border-radius: 35px; box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            box-sizing: border-box;
        }

        /* 頂部切換 */
        .tab-group { display: flex; gap: 8px; margin-bottom: 15px; }
        .tab-btn {
            flex: 1; padding: 12px; border-radius: 15px; border: none;
            background: #F5F5F5; cursor: pointer; font-size: 16px; font-weight: bold; color: #AAA;
        }
        .tab-btn.active { background: var(--soft-blue); color: white; }

        /* 視角切換器 */
        .view-switcher {
            display: flex; background: #EEE; border-radius: 12px; padding: 4px; margin-bottom: 15px;
        }
        .view-btn {
            flex: 1; border: none; background: none; padding: 8px; border-radius: 10px;
            font-size: 14px; font-weight: bold; color: #777; cursor: pointer;
        }
        .view-btn.active { background: white; color: var(--text-dark); box-shadow: 0 2px 5px rgba(0,0,0,0.1); }

        /* 週曆控制 */
        .calendar-area { display: block; }
        .calendar-ctrl { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
        .nav-btn { background: none; border: none; font-size: 22px; color: var(--soft-blue); cursor: pointer; }
        .week-calendar { display: flex; justify-content: space-between; margin-bottom: 15px; }
        .day-item {
            display: flex; flex-direction: column; align-items: center;
            min-width: 42px; padding: 8px 0; border-radius: 12px; cursor: pointer;
        }
        .day-item.active { background-color: #FF8A80; color: white; }

        /* 四象限矩陣 */
        .matrix { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .quadrant { padding: 12px; border-radius: 20px; min-height: 150px; }
        .quad-title { font-size: 11px; font-weight: bold; margin-bottom: 8px; color: rgba(0,0,0,0.3); text-align: center; }
        .q1 { background: var(--urgent-pink); } .q2 { background: var(--important-yellow); }
        .q3 { background: var(--delegate-blue); } .q4 { background: var(--waste-green); }

        /* 總覽清單視角 */
        #overview-list { display: none; margin-bottom: 20px; max-height: 400px; overflow-y: auto; }
        .date-group-title { font-size: 12px; color: #999; margin: 15px 0 5px 5px; border-left: 3px solid var(--soft-blue); padding-left: 8px; }

        /* 任務條目 */
        .list-item { 
            background: rgba(255,255,255,0.8); margin-bottom: 6px; padding: 10px; border-radius: 12px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
        }
        .task-row { display: flex; align-items: center; gap: 8px; }
        .completed { text-decoration: line-through; opacity: 0.4; }
        .due-tag { font-size: 10px; color: #777; background: rgba(0,0,0,0.05); padding: 2px 6px; border-radius: 6px; margin-top: 5px; display: inline-block; }
        .overdue-label { color: white; background: var(--due-red); padding: 1px 4px; border-radius: 3px; margin-right: 5px; font-size: 10px; }

        /* 輸入區 */
        .input-panel { background: #F8FDFF; border: 2px solid #E3F2FD; padding: 15px; border-radius: 25px; }
        .input-panel input, .input-panel select { width: 100%; padding: 12px; border-radius: 12px; border: 1px solid #DDD; margin-bottom: 8px; box-sizing: border-box; font-size: 16px; }
        .add-btn { background: var(--soft-blue); color: white; border: none; font-weight: bold; cursor: pointer; width: 100%; padding: 14px; border-radius: 12px; }
        
        #status { text-align: center; font-size: 11px; color: #BBB; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div class="tab-group">
        <button id="tab-工作" class="tab-btn active" onclick="switchTab('工作')">💼 工作</button>
        <button id="tab-家庭" class="tab-btn" onclick="switchTab('家庭')">🏠 家庭</button>
    </div>

    <div class="view-switcher">
        <button class="view-btn active" id="btn-day" onclick="switchView('day')">日視角 (象限)</button>
        <button class="view-btn" id="btn-all" onclick="switchView('all')">總覽 (全部待辦)</button>
    </div>

    <div id="day-area">
        <div class="calendar-ctrl">
            <button class="nav-btn" onclick="changeWeek(-7)">＜</button>
            <div id="monthLabel" class="month-label" onclick="goToday()">2026年 3月</div>
            <button class="nav-btn" onclick="changeWeek(7)">＞</button>
        </div>
        <div class="week-calendar" id="weekBar"></div>
        <div class="matrix">
            <div class="quadrant q1"><div class="quad-title">重要 & 緊急</div><div id="list-Q1"></div></div>
            <div class="quadrant q2"><div class="quad-title">重要 & 不緊急</div><div id="list-Q2"></div></div>
            <div class="quadrant q3"><div class="quad-title">緊急 & 不重要</div><div id="list-Q3"></div></div>
            <div class="quadrant q4"><div class="quad-title">不重要 & 不緊急</div><div id="list-Q4"></div></div>
        </div>
    </div>

    <div id="overview-list"></div>

    <div class="input-panel">
        <input type="text" id="todoInput" placeholder="新的任務內容...">
        <div style="display:flex; gap:8px;">
            <div style="flex:1">
                <label style="font-size:10px; color:#999; margin-left:5px;">截止日期</label>
                <input type="date" id="dueInput" style="margin-bottom:0">
            </div>
            <div style="flex:1">
                <label style="font-size:10px; color:#999; margin-left:5px;">優先級</label>
                <select id="quadInput" style="margin-bottom:0">
                    <option value="Q1">粉：重/急</option><option value="Q2">黃：重/不急</option>
                    <option value="Q3">藍：急/重</option><option value="Q4">綠：不重</option>
                </select>
            </div>
        </div>
        <button class="add-btn" onclick="addTodo()" style="margin-top:10px;">加入當前日期</button>
    </div>
    <div id="status">● 準備就緒</div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz65XpjDIa1MSkPZCuSKVNlLH4lpf0cednP-fK9V40YP_VBKQiXUd7Nv8rNHOv8jZKd/exec"; 
    let todos = [];
    let baseDate = new Date();
    let selectedDateStr = new Date().toLocaleDateString();
    let currentTab = localStorage.getItem('soda_last_tab') || '工作';
    let currentView = 'day'; 

    const local = localStorage.getItem('soda_v7_data');
    if (local) todos = JSON.parse(local);

    function showStatus(msg) { document.getElementById('status').innerText = msg; }

    function switchTab(tab) {
        currentTab = tab;
        localStorage.setItem('soda_last_tab', tab);
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        document.getElementById(`tab-${tab}`).classList.add('active');
        render();
    }

    function switchView(view) {
        currentView = view;
        document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(`btn-${view}`).classList.add('active');
        document.getElementById('day-area').style.display = (view === 'day') ? 'block' : 'none';
        document.getElementById('overview-list').style.display = (view === 'all') ? 'block' : 'none';
        render();
    }

    function changeWeek(days) { baseDate.setDate(baseDate.getDate() + days); initCalendar(); }
    function goToday() { baseDate = new Date(); selectedDateStr = new Date().toLocaleDateString(); initCalendar(); render(); }

    function initCalendar() {
        const weekBar = document.getElementById('weekBar');
        document.getElementById('monthLabel').innerText = `${baseDate.getFullYear()}年 ${baseDate.getMonth() + 1}月`;
        const weekDays = ['日', '一', '二', '三', '四', '五', '六'];
        weekBar.innerHTML = '';
        for (let i = -3; i <= 3; i++) {
            let d = new Date(baseDate); d.setDate(baseDate.getDate() + i);
            let dateStr = d.toLocaleDateString();
            let item = document.createElement('div');
            item.className = `day-item ${dateStr === selectedDateStr ? 'active' : ''}`;
            item.onclick = () => { selectedDateStr = dateStr; initCalendar(); render(); };
            item.innerHTML = `<span>${weekDays[d.getDay()]}</span><span>${d.getDate()}</span>`;
            weekBar.appendChild(item);
        }
    }

    async function syncFromCloud() {
        showStatus("● 同步中...");
        try { 
            const res = await fetch(SCRIPT_URL); 
            const cloudData = await res.json();
            if (cloudData && cloudData.length > 0) {
                todos = cloudData;
                localStorage.setItem('soda_v7_data', JSON.stringify(todos));
                render();
            }
            showStatus("● 雲端已更新");
        } catch (e) { showStatus("● 離線模式"); }
    }

    async function syncToCloud() {
        localStorage.setItem('soda_v7_data', JSON.stringify(todos));
        try { await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(todos) }); showStatus("● 已存雲端"); } catch (e) { showStatus("● 儲存失敗"); }
    }

    function render() {
        if (currentView === 'day') {
            renderDayView();
        } else {
            renderAllView();
        }
    }

    function renderDayView() {
        const quads = ['Q1', 'Q2', 'Q3', 'Q4'];
        quads.forEach(q => {
            const div = document.getElementById(`list-${q}`);
            div.innerHTML = '';
            let filtered = todos.filter(t => t.date === selectedDateStr && t.quad === q && t.type === currentTab);
            filtered.forEach(item => {
                const idx = todos.indexOf(item);
                div.innerHTML += createItemHTML(item, idx);
            });
        });
    }

    function renderAllView() {
        const container = document.getElementById('overview-list');
        container.innerHTML = '<h3 style="font-size:14px; margin-bottom:10px;">所有未完成任務 (工作+家庭)</h3>';
        
        // 抓出所有未完成的
        let pending = todos.filter(t => !t.done && t.type === currentTab);
        
        // 按日期排序
        pending.sort((a, b) => new Date(a.date) - new Date(b.date));

        if (pending.length === 0) {
            container.innerHTML += '<p style="color:#CCC; text-align:center; margin-top:30px;">目前沒有待辦事項！</p>';
            return;
        }

        let lastDate = "";
        pending.forEach(item => {
            if (item.date !== lastDate) {
                container.innerHTML += `<div class="date-group-title">${item.date === new Date().toLocaleDateString() ? "📅 今天" : item.date}</div>`;
                lastDate = item.date;
            }
            const idx = todos.indexOf(item);
            const isOverdue = new Date(item.date) < new Date(new Date().toLocaleDateString());
            container.innerHTML += `
                <div class="list-item" style="border-left: 5px solid var(--${item.quad.toLowerCase() === 'q1' ? 'urgent-pink' : item.quad.toLowerCase() === 'q2' ? 'important-yellow' : item.quad.toLowerCase() === 'q3' ? 'delegate-blue' : 'waste-green'})">
                    <div class="task-row">
                        <input type="checkbox" onchange="toggleDone(${idx})">
                        <span style="flex:1">${isOverdue ? '<span class="overdue-label">逾期</span>' : ''}${item.text}</span>
                        <span onclick="deleteTask(${idx})" style="color:#CCC; cursor:pointer;">×</span>
                    </div>
                </div>
            `;
        });
    }

    function createItemHTML(item, idx) {
        return `
            <div class="list-item">
                <div class="task-row">
                    <input type="checkbox" ${item.done ? 'checked' : ''} onchange="toggleDone(${idx})">
                    <span class="${item.done ? 'completed' : ''}" style="flex:1" onclick="editTask(${idx})">${item.text}</span>
                    <span onclick="deleteTask(${idx})" style="color:#CCC; cursor:pointer;">×</span>
                </div>
                ${item.due ? `<span class="due-tag">📅 截止: ${item.due}</span>` : ''}
            </div>
        `;
    }

    function addTodo() {
        const text = document.getElementById('todoInput').value;
        const due = document.getElementById('dueInput').value;
        const quad = document.getElementById('quadInput').value;
        if (!text) return;
        todos.push({ text, type: currentTab, quad, date: selectedDateStr, due, done: false });
        document.getElementById('todoInput').value = '';
        render(); syncToCloud();
    }

    function toggleDone(idx) { todos[idx].done = !todos[idx].done; render(); syncToCloud(); }
    function deleteTask(idx) { if(confirm('刪除？')) { todos.splice(idx,1); render(); syncToCloud(); } }
    function editTask(idx) { 
        const v = prompt("修改:", todos[idx].text); 
        if(v) { todos[idx].text = v; render(); syncToCloud(); } 
    }

    initCalendar();
    render();
    syncFromCloud();
</script>
</body>
</html>
